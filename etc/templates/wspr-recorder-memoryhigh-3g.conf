# wspr-recorder MemoryHigh per-host drop-in (3G)
#
# WHEN TO USE: a wspr-recorder running with multiple sources (or one
# source publishing all 17 WSPR bands) approaches the canonical 2G
# MemoryHigh in /etc/systemd/system/wspr-recorder@.service.d/memory-cap.conf
# and starts misbehaving — symptoms include channel "Stream restored"
# flap storms (kernel throttling triggers packet gaps), IPC timeouts
# from wspr-ctl, slow sqlite writes, and rising swap-outs.
#
# Why: the canonical 2G cap was tuned to a single-source 6-WSPR-band
# workload + observability headroom.  Dual-source / full-17-band
# decoders need ~2.5-3 G under steady state (decoder rings + WAV
# buffers + spot_sink batches + IPC threads).
#
# HOW (preferred — survives reboot, no editing of canonical units):
#   sudo systemctl set-property wspr-recorder@<instance> MemoryHigh=3G
# That command writes the equivalent of THIS FILE into
# /etc/systemd/system.control/wspr-recorder@<instance>.service.d/
# automatically, and takes effect on the running process without a
# service restart.
#
# Manual placement (if you can't use set-property): drop this file at
# /etc/systemd/system.d/wspr-recorder@<instance>.service.d/50-MemoryHigh.conf
# and `systemctl daemon-reload && systemctl restart` the unit.
#
# REVERT: `sudo systemctl revert wspr-recorder@<instance>` removes all
# .control drop-ins for that instance and falls back to the canonical
# memory-cap.conf.
#
# MemoryMax stays at 4G (the canonical hard cap; bigger is unwarranted).
# MemorySwapMax=0 stays at the canonical setting so a real leak still
# gets OOM-killed instead of swap-thrashing.

[Service]
MemoryHigh=3G
