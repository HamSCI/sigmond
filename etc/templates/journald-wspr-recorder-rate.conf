# journald rate-limit bump for wspr-recorder
#
# WHEN TO USE: `smd watch wspr` is missing cycle-commit lines for one
# rx_source even though sink data shows the recorder IS committing
# cycles (noise rows present in pending_uploads).  Symptom is
# accompanied by ``Suppressed N messages from wspr-recorder@*.service``
# in the journal where N approaches or exceeds 10000 / 30 s.
#
# Why: journald's default RateLimitBurst=10000 / RateLimitIntervalSec=30s
# is too tight for a 17-band wspr-recorder load (one WAV-writer log
# line per band per cycle, plus decoder + cycle-commit lines).  Each
# rx_source can emit ~10000 lines per 30 s on its own under steady
# state with 17 bands.
#
# HOW: drop this file at /etc/systemd/journald.conf.d/, then
#   sudo systemctl restart systemd-journald
# Verify with:
#   sudo journalctl --since '5 minutes ago' | grep -c 'Suppressed.*wspr-recorder'
#   (should drop to 0 or near-0)
#
# REVERT: rm the file + restart systemd-journald.

[Journal]
RateLimitIntervalSec=30s
RateLimitBurst=40000
